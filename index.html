<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f3ea">
    <title>Podcast Randomizer</title>
    <link rel="manifest" href="manifest.webmanifest?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=3">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Sleep queue</p>
          <h1 id="app-title">Podcast Randomizer</h1>
        </div>
        <button id="settings-toggle" class="settings-button" type="button" aria-expanded="false" aria-controls="settings-panel">
          Settings
        </button>
      </section>

      <section id="settings-panel" class="controls" aria-label="Podcast choices" hidden>
        <fieldset>
          <legend>Podcasts</legend>
          <label class="check-row">
            <input type="checkbox" name="podcast" value="278981407" checked>
            <span>
              <strong>Stuff You Should Know</strong>
              <small>Apple Podcasts</small>
            </span>
          </label>
          <label class="check-row">
            <input type="checkbox" name="podcast" value="394775318" checked>
            <span>
              <strong>99% Invisible</strong>
              <small>Apple Podcasts</small>
            </span>
          </label>
        </fieldset>

        <fieldset>
          <legend>Episode pool</legend>
          <label class="radio-row">
            <input type="radio" name="age" value="0">
            <span>Anything loaded</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="age" value="30">
            <span>Older than 30 days</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="age" value="90" checked>
            <span>Older than 90 days</span>
          </label>
        </fieldset>
      </section>

      <section class="episode-panel" aria-live="polite">
        <div id="status" class="status">Loading episodes...</div>

        <article id="episode" class="episode" hidden>
          <div class="show-row">
            <img id="artwork" alt="" width="72" height="72">
            <div>
              <p id="collection" class="collection"></p>
              <h2 id="title"></h2>
            </div>
          </div>

          <dl class="meta">
            <div>
              <dt>Released</dt>
              <dd id="date"></dd>
            </div>
            <div>
              <dt>Duration</dt>
              <dd id="duration"></dd>
            </div>
          </dl>

          <p id="summary" class="summary"></p>

          <div class="actions">
            <a id="open-link" class="primary-button" href="#" target="_blank" rel="noopener">Open in Podcasts</a>
            <button id="reroll" type="button" class="secondary-button">Another</button>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js?v=3" type="module"></script>
  </body>
</html>
